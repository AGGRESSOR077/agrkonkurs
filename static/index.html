<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PUBG Contest</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --bg:#0b1020;
  --card:#141b34;
  --card2:#1b2445;
  --text:#f5f7ff;
  --muted:#9ea7c7;
  --primary:#6ea8ff;
  --accent:#7bffca;
  --danger:#ff6b6b;
  --gold:#ffd166;
  --silver:#d9e1ec;
  --bronze:#d4a373;
  --radius:22px;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(circle at top right,#22306d 0%,transparent 30%),
    radial-gradient(circle at bottom left,#0f5f52 0%,transparent 30%),
    var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
}

.app{
  max-width:560px;
  margin:auto;
  min-height:100vh;
  padding:16px 16px 110px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.logo{
  font-size:22px;
  font-weight:800;
}

.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid rgba(255,255,255,.06);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  backdrop-filter:blur(10px);
}

.hero{
  padding:22px;
}

.rank{
  font-size:42px;
  font-weight:900;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.stat{
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:12px;
}

.label{
  color:var(--muted);
  font-size:13px;
}

.value{
  font-size:22px;
  font-weight:700;
}

.progress{
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  margin-top:10px;
}

.progress span{
  display:block;
  height:100%;
  background:linear-gradient(90deg,var(--primary),var(--accent));
}

.btn{
  border:none;
  cursor:pointer;
  border-radius:16px;
  padding:14px;
  width:100%;
  font-weight:700;
  margin-top:8px;
}

.primary{
  background:linear-gradient(135deg,var(--primary),#8c7cff);
  color:#fff;
}

.secondary{
  background:rgba(255,255,255,.08);
  color:#fff;
}

.list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:rgba(255,255,255,.05);
  padding:14px;
  border-radius:16px;
}

.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.ok{background:#1f6f48}
.wait{background:#8a6d1f}
.off{background:#7a2734}

.leader.top1{border-left:5px solid var(--gold)}
.leader.top2{border-left:5px solid var(--silver)}
.leader.top3{border-left:5px solid var(--bronze)}

.input{
  width:100%;
  background:rgba(255,255,255,.06);
  border:none;
  color:white;
  padding:12px;
  border-radius:14px;
  margin-top:8px;
}

.tabbar{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:100%;
  max-width:560px;
  background:rgba(9,13,28,.95);
  backdrop-filter:blur(12px);
  display:flex;
  border-top:1px solid rgba(255,255,255,.08);
}

.tab{
  flex:1;
  text-align:center;
  padding:14px 6px;
  color:var(--muted);
  cursor:pointer;
  font-size:12px;
}

.tab.active{
  color:white;
}

.hidden{
  display:none;
}

.center{
  text-align:center;
  padding:40px 20px;
}

.countdown{
  color:var(--accent);
  font-weight:700;
}

small{color:var(--muted)}
</style>
</head>
<body>

<div class="app">

  <div id="loading" class="center">
    Yuklanmoqda...
  </div>

  <div id="blocked" class="center hidden">
    <h2>Siz bloklangansiz</h2>
  </div>

  <div id="unregistered" class="center hidden">
    <h2>Avval botga /start yozing</h2>
  </div>

  <div id="mainApp" class="hidden">

    <div class="header">
      <div class="logo">🏆 PUBG Contest</div>
      <div id="username"></div>
    </div>

    <!-- HOME -->
    <section id="tab-home">

      <div class="card hero">
        <div class="label">Joriy reyting</div>
        <div class="rank">#<span id="rank">0</span></div>

        <div style="margin-top:10px">
          <small>Top sovrin zonasiga yaqinlashuv</small>
          <div class="progress">
            <span id="progressBar" style="width:0%"></span>
          </div>
        </div>
      </div>

      <div class="grid">
        <div class="stat">
          <div class="label">Referallar</div>
          <div class="value" id="refCount">0</div>
        </div>

        <div class="stat">
          <div class="label">Kutilmoqda</div>
          <div class="value" id="pendingCount">0</div>
        </div>
      </div>

      <div class="card">
        <div class="label">Referal havola</div>
        <div id="refLink" style="margin-top:10px;word-break:break-all"></div>

        <button class="btn primary" onclick="copyReferral()">
          Nusxalash
        </button>

        <button class="btn secondary" onclick="shareReferral()">
          Ulashish
        </button>
      </div>

      <div class="card" id="pubgCard">
        <!-- JS orqali to'ldiriladi: PUBG ID ko'rsatish yoki qo'shish formasi -->
      </div>

    </section>

    <!-- LEADERBOARD -->
    <section id="tab-leaderboard" class="hidden">
      <div id="leaderboardList"></div>
    </section>

    <!-- GIFTS -->
    <section id="tab-gifts" class="hidden">
      <div id="giftCountdown" class="card hidden"></div>
      <div id="giftList"></div>
    </section>

    <!-- HISTORY -->
    <section id="tab-history" class="hidden">
      <div id="historyList"></div>
    </section>

    <!-- ADMIN -->
    <section id="tab-admin" class="hidden">
      <div id="adminContent"></div>
    </section>

  </div>

</div>

<div class="tabbar hidden" id="tabbar">
  <div class="tab active" data-tab="home">🏠<br>Bosh</div>
  <div class="tab" data-tab="leaderboard">🏆<br>Top</div>
  <div class="tab" data-tab="gifts">🎁<br>Sovrin</div>
  <div class="tab" data-tab="history">📜<br>Tarix</div>
  <div class="tab hidden" id="adminTabButton" data-tab="admin">⚙️<br>Admin</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let STATE = {
  me:null,
  loaded:{}
};

function authHeaders(){
  return {
    "Content-Type":"application/json",
    "X-Telegram-Init-Data": tg.initData || ""
  };
}

async function api(url, options={}){
  try{
    const res = await fetch(url,{
      ...options,
      headers:{
        ...authHeaders(),
        ...(options.headers || {})
      }
    });

    if(!res.ok) throw new Error("Server error");
    return await res.json();
  }catch(err){
    tg.showAlert("Ma'lumot yuklanmadi");
    throw err;
  }
}

function show(id){
  document.querySelectorAll("section").forEach(x=>x.classList.add("hidden"));
  document.getElementById("tab-"+id).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector(`[data-tab="${id}"]`)?.classList.add("active");

  lazyLoad(id);
}

async function init(){

  try{
    const me = await api("/api/me");
    STATE.me = me;

    loading.classList.add("hidden");

    if(me.is_banned){
      blocked.classList.remove("hidden");
      return;
    }

    if(!me.registered){
      unregistered.classList.remove("hidden");
      return;
    }

    mainApp.classList.remove("hidden");
    tabbar.classList.remove("hidden");

    fillHome(me);

    if(me.is_admin){
      adminTabButton.classList.remove("hidden");
    }

  }catch{
    loading.innerHTML="Xatolik. Qayta urinib ko'ring.";
  }
}

async function fillHome(me){

  username.textContent = me.user.full_name;

  rank.textContent = me.stats.rank ?? "—";
  refCount.textContent = me.stats.referral_count;
  pendingCount.textContent = me.stats.pending_count;

  let percent = me.stats.in_gift_zone
      ? 100
      : Math.max(5,100 - (me.stats.needed_for_gift*10));

  progressBar.style.width = percent + "%";

  try{
    const r = await api("/api/referral-link");
    refLink.textContent = r.link;
    STATE.refLink = r.link;
  }catch{}

  renderPubgCard(me.user.pubg_id);
}

function renderPubgCard(pubgId){
  const card = document.getElementById("pubgCard");
  if(pubgId){
    card.innerHTML = `
      <div class="label">PUBG ID</div>
      <div style="font-size:18px;font-weight:700;margin-top:6px">${pubgId}</div>
      <button class="btn secondary" onclick="editPubgId()">O'zgartirish</button>
      <div id="pubgError" style="color:var(--danger);font-size:13px;margin-top:6px"></div>
    `;
  } else {
    card.innerHTML = `
      <div class="label">PUBG ID (ixtiyoriy)</div>
      <small>Reytingda ko'rsatish uchun PUBG ID qo'shing</small>
      <input class="input" id="pubgInput" placeholder="Masalan: 5123456789" inputmode="numeric">
      <button class="btn primary" onclick="savePubgId()">Saqlash</button>
      <div id="pubgError" style="color:var(--danger);font-size:13px;margin-top:6px"></div>
    `;
  }
}

function editPubgId(){
  renderPubgCard(null);
}

async function savePubgId(){
  const input = document.getElementById("pubgInput");
  const errorBox = document.getElementById("pubgError");
  const value = input.value.trim();
  errorBox.textContent = "";

  try{
    const res = await fetch("/api/pubg-id", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ pubg_id: value })
    });
    const data = await res.json();

    if(!res.ok){
      errorBox.textContent = data.message || "Xatolik yuz berdi";
      return;
    }

    renderPubgCard(data.pubg_id);
    tg.showAlert("PUBG ID saqlandi!");
  }catch{
    errorBox.textContent = "Server bilan aloqa yo'q";
  }
}

async function lazyLoad(tab){

  if(STATE.loaded[tab]) return;

  try{

    if(tab==="leaderboard"){
      const data = await api("/api/leaderboard");

      if(data.leaderboard.length === 0){
        leaderboardList.innerHTML = `<div class="center"><p>Hali hech kim referal qo'shmagan.<br>Birinchi bo'ling! 🎯</p></div>`;
      } else {
        leaderboardList.innerHTML = data.leaderboard.map((u,i)=>`
        <div class="card leader top${i+1}">
          <div class="row">
            <b>#${u.rank} ${u.name}</b>
            <b>${u.ref_count}</b>
          </div>
          <small>@${u.username || "-"} | PUBG: ${u.pubg_id || "kiritilmagan"}</small>
        </div>`).join("");
      }
    }

    if(tab==="gifts"){
      const data = await api("/api/gifts");

      if(data.end_date){
        giftCountdown.classList.remove("hidden");
        giftCountdown.innerHTML =
          `<div class="countdown">⏳ ${data.end_date}</div>`;
      }

      if(data.gifts.length === 0){
        giftList.innerHTML = `<div class="center"><p>Sovrinlar hali e'lon qilinmagan.<br>Tez kunda! 🎁</p></div>`;
      } else {
        giftList.innerHTML = data.gifts.map(g=>`
        <div class="card">
          <b>${g.place}-o'rin</b><br>
          ${g.name}
        </div>`).join("");
      }
    }

    if(tab==="history"){
      const data = await api("/api/history");

      if(data.history.length === 0){
        historyList.innerHTML = `<div class="center"><p>Hali hech kimni taklif qilmadingiz.<br>Referal havolangizni ulashing!</p></div>`;
      } else {
        historyList.innerHTML = data.history.map(h=>{

          let badge =
            h.confirmed
              ? `<span class="badge ok">Tasdiqlangan</span>`
              : `<span class="badge wait">Kutilmoqda</span>`;

          if(!h.active)
            badge=`<span class="badge off">Chiqib ketgan</span>`;

          return `
          <div class="card">
            <div class="row">
              <b>${h.name}</b>
              ${badge}
            </div>
            <small>${new Date(h.date).toLocaleString()}</small>
          </div>`;
        }).join("");
      }
    }

    if(tab==="admin"){
      await loadAdmin();
    }

    STATE.loaded[tab]=true;

  }catch{}
}

async function loadAdmin(){

  const stats = await api("/api/admin/stats");
  const usersData = await api("/api/admin/users");

  const usersHtml = usersData.users.map(u => `
    <div class="item">
      <div class="row">
        <b>${u.name}</b>
        <span>${u.ref_count} ⭐</span>
      </div>
      <small>🆔 ${u.telegram_id} | @${u.username || "-"}</small><br>
      <small>🎮 ${u.pubg_id || "PUBG ID kiritilmagan"} | 📱 ${u.phone || "Yo'q"}</small>
      ${u.banned ? '<br><span class="badge off" style="margin-top:6px;display:inline-block">BAN</span>' : ''}
    </div>
  `).join("");

  adminContent.innerHTML = `
  <div class="grid">
    <div class="stat">
      <div class="label">Users</div>
      <div class="value">${stats.total_users}</div>
    </div>
    <div class="stat">
      <div class="label">Referal</div>
      <div class="value">${stats.total_referrals}</div>
    </div>
  </div>

  <div class="card">
    <h3>So'nggi 3 foydalanuvchi</h3>
    <div class="list" style="margin-top:10px">
      ${usersHtml || "<small>Foydalanuvchilar yo'q</small>"}
    </div>
    <button class="btn primary" onclick="downloadUsersExcel()" id="excelBtn">
      📥 Ma'lumotlarni yuklab olish
    </button>
  </div>

  <div class="card">
    <h3>Kanal qo'shish</h3>
    <input class="input" id="chUser" placeholder="@kanal">
    <input class="input" id="chName" placeholder="Nomi">
    <button class="btn primary" onclick="addChannel()">Saqlash</button>
  </div>

  <div class="card">
    <h3>Ban / Unban</h3>
    <input class="input" id="banUser" placeholder="username">
    <button class="btn primary" onclick="banUser()">Ban</button>
    <button class="btn secondary" onclick="unbanUser()">Unban</button>
  </div>

  <div class="card">
    <h3>Sovrin</h3>
    <input class="input" id="giftPlace" placeholder="O'rin">
    <input class="input" id="giftName" placeholder="Nomi">
    <button class="btn primary" onclick="saveGift()">Saqlash</button>
  </div>

  <div class="card">
    <button class="btn primary" onclick="makeWinners()">
      G'oliblarni belgilash
    </button>

    <button class="btn" style="background:var(--danger);color:white"
      onclick="resetContest()">
      Konkursni tugatish
    </button>
  </div>
  `;
}

async function downloadUsersExcel(){
  const btn = document.getElementById("excelBtn");
  const originalText = btn.textContent;
  btn.textContent = "⏳ Tayyorlanmoqda...";
  btn.disabled = true;

  try{
    const res = await fetch("/api/admin/users/export", { headers: authHeaders() });
    if(!res.ok) throw new Error("export failed");

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "foydalanuvchilar.xlsx";
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    tg.showAlert("Fayl yuklandi!");
  }catch{
    tg.showAlert("Faylni yuklab bo'lmadi");
  }finally{
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

async function addChannel(){
  await api("/api/admin/channels",{
    method:"POST",
    body:JSON.stringify({
      username:chUser.value,
      name:chName.value
    })
  });
  tg.showAlert("Saqlandi");
}

async function banUser(){
  await api("/api/admin/ban",{
    method:"POST",
    body:JSON.stringify({username:banUser.value})
  });
}

async function unbanUser(){
  await api("/api/admin/unban",{
    method:"POST",
    body:JSON.stringify({username:banUser.value})
  });
}

async function saveGift(){
  await api("/api/admin/gifts",{
    method:"POST",
    body:JSON.stringify({
      place:Number(giftPlace.value),
      name:giftName.value
    })
  });
}

async function makeWinners(){
  await api("/api/admin/winners",{method:"POST"});
  tg.showAlert("G'oliblar saqlandi");
}

async function resetContest(){

  if(!confirm("Konkursni tugatilsinmi?")) return;

  await api("/api/admin/reset-contest",{
    method:"POST"
  });

  tg.showAlert("Konkurs tugatildi");
}

async function copyReferral(){
  navigator.clipboard.writeText(STATE.refLink || "");
  tg.showAlert("Nusxalandi");
}

function shareReferral(){

  if(tg.openTelegramLink){
    tg.openTelegramLink(
      "https://t.me/share/url?url=" +
      encodeURIComponent(STATE.refLink)
    );
  }
}

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    show(tab.dataset.tab);
  });
});

init();
</script>

</body>
</html>
